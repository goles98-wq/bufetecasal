<script>
(function(){
"use strict";

/* =========================================================
   UTILIDADES
========================================================= */
const $ = (sel, ctx) => (ctx||document).querySelector(sel);
const $$ = (sel, ctx) => Array.from((ctx||document).querySelectorAll(sel));
const uid = () => (crypto.randomUUID ? crypto.randomUUID() : 'id-'+Date.now()+'-'+Math.random().toString(16).slice(2));
const todayISO = () => new Date().toISOString().slice(0,10);
const addDays = (n, base) => { const d = base? new Date(base): new Date(); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); };
const addMonthsStr = (n, base) => { const d = base? new Date(base): new Date(); d.setMonth(d.getMonth()+n); return d.toISOString().slice(0,10); };
const monthKey = (dateStr) => (dateStr||'').slice(0,7);
const esc = (s) => String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function fmtDate(iso){ if(!iso) return '—'; const [y,m,d]=iso.split('-'); return `${d}/${m}/${y}`; }
function fmtMoney(n){ n = Number(n)||0; return n.toLocaleString('es-ES',{style:'currency',currency:'EUR'}); }
function daysLeft(iso){ if(!iso) return null; const d = new Date(iso+'T00:00:00'); const t = new Date(); t.setHours(0,0,0,0); return Math.round((d-t)/86400000); }
function urgency(iso, doneFlag){
  if(doneFlag) return {cls:'badge-green', label:'Cumplido'};
  if(!iso) return {cls:'badge-gray', label:'Sin fecha'};
  const dl = daysLeft(iso);
  if(dl < 0) return {cls:'badge-red', label:`Vencido (${Math.abs(dl)}d)`};
  if(dl <= 7) return {cls:'badge-red', label:`${dl}d — Urgente`};
  if(dl <= 15) return {cls:'badge-orange', label:`${dl}d — Próximo`};
  if(dl <= 30) return {cls:'badge-yellow', label:`${dl}d`};
  return {cls:'badge-gray', label:fmtDate(iso)};
}
function badge(u){ return `<span class="badge ${u.cls}">${esc(u.label)}</span>`; }
function el(html){ const t=document.createElement('template'); t.innerHTML=html.trim(); return t.content.firstElementChild; }
function toast(msg){
  const t = el(`<div class="fixed bottom-4 right-4 bg-slate-900 text-white text-sm px-4 py-2 rounded-lg shadow-lg z-[200]">${esc(msg)}</div>`);
  document.body.appendChild(t); setTimeout(()=>t.remove(), 2200);
}
function confirmAction(msg){ return window.confirm(msg); }

/* =========================================================
   BASE DE DATOS (localStorage)
========================================================= */
const STORAGE_KEY = 'bufete_casal_db_v1';

const DB = {
  load(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw) return JSON.parse(raw);
    }catch(e){ console.error('Error leyendo DB', e); }
    return null;
  },
  save(state){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  },
  empty(){
    return {
      version: 1,
      clients: [],
      cases: [],
      properties: [],
      contracts: [],
      payments: [],
      events: [],
      documents: [],
      matterTypes: ['Civil','Mercantil','Laboral','Herencias','Arrendamientos','Penal','Administrativo','Familia'],
      pipelineStages: ['Nuevo','En estudio','En trámite','Pendiente resolución','Resuelto','Archivado'],
      lawyers: ['Ana López','Carlos Ruiz','Marta Sanz'],
    };
  },
  seed(){
    const s = DB.empty();
    // ---- Clientes ----
    const c1 = {id: uid(), name:'María Fernández', taxId:'12345678A', type:'particular', email:'maria.fernandez@example.com', phone:'611 222 333', address:'C/ Alcalá 45, Madrid', notes:'Cliente desde 2019. Prefiere contacto por email.'};
    const c2 = {id: uid(), name:'Distribuciones Ibérica S.L.', taxId:'B12345678', type:'empresa', email:'admin@distribuicberica.es', phone:'910 111 222', address:'Pol. Ind. Norte, Nave 4, Alcobendas', notes:'Cliente corporativo, varios inmuebles en cartera.'};
    const c3 = {id: uid(), name:'Juan Pérez', taxId:'87654321B', type:'particular', email:'juanperez@example.com', phone:'622 333 444', address:'Av. de América 10, Madrid', notes:''};
    const c4 = {id: uid(), name:'Constructora Delta S.A.', taxId:'A87654321', type:'empresa', email:'legal@constructoradelta.es', phone:'913 555 666', address:'Paseo de la Castellana 200, Madrid', notes:'Requiere informes trimestrales.'};
    s.clients.push(c1,c2,c3,c4);

    // ---- Expedientes ----
    const cases = [
      {id:uid(), ref:'EXP-2026-001', clientId:c1.id, matterType:'Herencias', lawyer:'Ana López', openDate: addDays(-120), description:'Reparto de herencia entre hermanos, disputa por vivienda familiar.', fees: 1800, status:'En trámite',
        milestones:[
          {id:uid(), title:'Presentación de inventario', dueDate: addDays(5), done:false},
          {id:uid(), title:'Vista en juzgado', dueDate: addDays(28), done:false},
        ],
        log:[
          {id:uid(), date: addDays(-100), text:'Primera reunión con la clienta, recopilación de documentación.'},
          {id:uid(), date: addDays(-40), text:'Presentado escrito de demanda de división de herencia.'},
        ]},
      {id:uid(), ref:'EXP-2026-002', clientId:c2.id, matterType:'Mercantil', lawyer:'Carlos Ruiz', openDate: addDays(-60), description:'Reclamación de cantidad a proveedor por incumplimiento de contrato.', fees: 3200, status:'Nuevo',
        milestones:[ {id:uid(), title:'Enviar burofax de requerimiento', dueDate: addDays(2), done:false} ],
        log:[ {id:uid(), date: addDays(-5), text:'Recibida documentación contractual del cliente.'} ]},
      {id:uid(), ref:'EXP-2026-003', clientId:c3.id, matterType:'Laboral', lawyer:'Marta Sanz', openDate: addDays(-200), description:'Despido improcedente, reclamación de indemnización.', fees: 1200, status:'Resuelto',
        milestones:[ {id:uid(), title:'Firma de acuerdo de conciliación', dueDate: addDays(-30), done:true} ],
        log:[ {id:uid(), date: addDays(-30), text:'Alcanzado acuerdo de conciliación con la empresa. Expediente resuelto.'} ]},
      {id:uid(), ref:'EXP-2026-004', clientId:c4.id, matterType:'Administrativo', lawyer:'Ana López', openDate: addDays(-15), description:'Recurso contra denegación de licencia de obra.', fees: 2500, status:'En estudio',
        milestones:[ {id:uid(), title:'Plazo de recurso de alzada', dueDate: addDays(12), done:false} ],
        log:[ {id:uid(), date: addDays(-15), text:'Apertura de expediente. Análisis de la resolución administrativa.'} ]},
      {id:uid(), ref:'EXP-2026-005', clientId:c2.id, matterType:'Arrendamientos', lawyer:'Carlos Ruiz', openDate: addDays(-8), description:'Redacción y revisión de nuevo contrato de arrendamiento local comercial.', fees: 600, status:'Pendiente resolución',
        milestones:[ {id:uid(), title:'Firma del contrato', dueDate: addDays(20), done:false} ],
        log:[]},
      {id:uid(), ref:'EXP-2026-006', clientId:c1.id, matterType:'Civil', lawyer:'Marta Sanz', openDate: addDays(-400), description:'Reclamación por daños en comunidad de propietarios.', fees: 900, status:'Archivado',
        milestones:[], log:[ {id:uid(), date: addDays(-380), text:'Expediente archivado por desistimiento del cliente.'} ]},
      {id:uid(), ref:'EXP-2026-007', clientId:c4.id, matterType:'Civil', lawyer:'Ana López', openDate: addDays(-3), description:'Consulta previa sobre servidumbre de paso.', fees: 0, status:'Nuevo',
        milestones:[ {id:uid(), title:'Enviar propuesta de honorarios', dueDate: addDays(-1), done:false} ],
        log:[]},
    ];
    s.cases.push(...cases);

    // ---- Inmuebles ----
    const p1 = {id:uid(), clientId:c2.id, address:'Local comercial, Gran Vía 12, Madrid', cadastralRef:'9872304VK4797S0001AB', type:'Local comercial', area:120, notes:'Escaparate a calle, muy buena ubicación.'};
    const p2 = {id:uid(), clientId:c1.id, address:'Piso 3ºB, Calle Mayor 5, Madrid', cadastralRef:'', type:'Vivienda', area:85, notes:'Reformado en 2022.'};
    const p3 = {id:uid(), clientId:c4.id, address:'Nave industrial, Polígono Sur, Getafe', cadastralRef:'4455102VK4745N0001XY', type:'Nave industrial', area:800, notes:'Incluye oficinas anexas.'};
    s.properties.push(p1,p2,p3);

    // ---- Contratos ----
    const ct1 = {id:uid(), propertyId:p1.id, tenant:'Cafetería Aroma S.L.', startDate: addDays(-500), endDate: addDays(18), renewalDate: addDays(18), rentAmount: 1450, deposit: 2900, expenses:'Comunidad a cargo del arrendatario. IBI a cargo del propietario.', ipcNotes:'Revisión anual según IPC cada aniversario del contrato.', notes:'Contrato con opción de renovación por 3 años.', status:'Activo'};
    const ct2 = {id:uid(), propertyId:p2.id, tenant:'David Molina Ortega', startDate: addDays(-200), endDate: addDays(165), renewalDate: addDays(165), rentAmount: 950, deposit: 950, expenses:'Suministros a cargo del inquilino.', ipcNotes:'Sin revisión IPC el primer año.', notes:'', status:'Activo'};
    const ct3 = {id:uid(), propertyId:p3.id, tenant:'Logística Rápida S.A.', startDate: addDays(-900), endDate: addDays(6), renewalDate: addDays(6), rentAmount: 4200, deposit: 8400, expenses:'Mantenimiento de instalaciones a cargo del arrendatario.', ipcNotes:'Revisión IPC aplicada en el último aniversario (+2,1%).', notes:'Pendiente de negociar renovación.', status:'Activo'};
    s.contracts.push(ct1,ct2,ct3);

    // ---- Pagos (histórico varios meses) ----
    function genPayments(contract, months, methods){
      const out = [];
      for(let i=months; i>=0; i--){
        const period = addMonthsStr(-i).slice(0,7);
        const expectedDate = period+'-05';
        let status = 'Cobrado', paidDate = period+'-0'+(3+ (i%5)), paidAmount = contract.rentAmount;
        if(i===2){ status='Impago'; paidDate=''; paidAmount=0; }
        else if(i===0){ status='Pendiente'; paidDate=''; paidAmount=0; }
        out.push({id:uid(), contractId:contract.id, period, expectedAmount:contract.rentAmount, expectedDate, paidAmount, paidDate, method: status==='Cobrado'? methods[i%methods.length] : '', status, notes: status==='Impago' ? 'Impago reclamado, en seguimiento.' : ''});
      }
      return out;
    }
    s.payments.push(...genPayments(ct1, 6, ['Transferencia','Domiciliación']));
    s.payments.push(...genPayments(ct2, 5, ['Transferencia']));
    s.payments.push(...genPayments(ct3, 7, ['Transferencia','Domiciliación','Cheque']));

    // ---- Eventos manuales ----
    s.events.push(
      {id:uid(), date: addDays(3), title:'Reunión con María Fernández', notes:'Revisión del reparto de herencia.'},
      {id:uid(), date: addDays(10), title:'Comida con Constructora Delta', notes:'Seguimiento de expedientes abiertos.'},
      {id:uid(), date: addDays(-2), title:'Auditoría interna de expedientes', notes:''}
    );

    // ---- Documentos ----
    s.documents.push(
      {id:uid(), relatedType:'case', relatedId:cases[0].id, name:'Testamento original (escaneado)', url:'https://example.com/docs/testamento.pdf', notes:'', createdAt: addDays(-90)},
      {id:uid(), relatedType:'client', relatedId:c2.id, name:'Escritura de constitución', url:'https://example.com/docs/escritura.pdf', notes:'', createdAt: addDays(-300)},
      {id:uid(), relatedType:'property', relatedId:p1.id, name:'Nota simple registral', url:'https://example.com/docs/nota-simple.pdf', notes:'', createdAt: addDays(-500)}
    );

    return s;
  },
  exportJSON(state){
    const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `bufete-casal-backup-${todayISO()}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href), 2000);
  }
};

========================================================= */
const clientById = id => state.clients.find(c=>c.id===id);
const caseById = id => state.cases.find(c=>c.id===id);
const propertyById = id => state.properties.find(p=>p.id===id);
const contractById = id => state.contracts.find(c=>c.id===id);
function clientName(id){ const c = clientById(id); return c? c.name : '—'; }
function propertyLabel(id){ const p = propertyById(id); return p? p.address : '—'; }
function casesOfClient(id){ return state.cases.filter(c=>c.clientId===id); }
function propertiesOfClient(id){ return state.properties.filter(p=>p.clientId===id); }
function contractsOfProperty(id){ return state.contracts.filter(c=>c.propertyId===id); }
function paymentsOfContract(id){ return state.payments.filter(p=>p.contractId===id).sort((a,b)=> a.period<b.period?1:-1); }
function activeContractOf(propId){ return contractsOfProperty(propId).find(c=>c.status==='Activo'); }

function allUpcomingDeadlines(daysWindow){
  const items = [];
  state.cases.forEach(c=>{
    (c.milestones||[]).forEach(m=>{
      if(m.done) return;
      const dl = daysLeft(m.dueDate);
      if(dl!==null && dl<=daysWindow){
        items.push({kind:'Expediente', kindColor:'badge-blue', refLabel:c.ref, title:m.title, date:m.dueDate, dl, link:`#/expedientes/${c.id}`, entityName: clientName(c.clientId)});
      }
    });
  });
  state.contracts.forEach(ct=>{
    if(ct.status!=='Activo') return;
    const dateRef = ct.renewalDate || ct.endDate;
    const dl = daysLeft(dateRef);
    if(dl!==null && dl<=daysWindow){
      items.push({kind:'Alquiler', kindColor:'badge-gold', refLabel: propertyLabel(ct.propertyId), title:`Vencimiento contrato — ${ct.tenant}`, date:dateRef, dl, link:`#/contratos/${ct.id}`, entityName: ct.tenant});
    }
  });
  return items.sort((a,b)=>a.dl-b.dl);
}

      </a>`;
    }).join('')}
  </div>`;
}
function renderFinanceControl(){
  const rows = state.payments.map(p=>{
    const ct = contractById(p.contractId);
    const prop = ct ? propertyById(ct.propertyId) : null;
    return {...p, ct, prop, clientId: prop? prop.clientId: null};
  }).filter(r=>r.ct && r.prop);

  const filtered = rows.filter(r=>{
    if(financeFilter.client && r.clientId!==financeFilter.client) return false;
    if(financeFilter.property && r.prop.id!==financeFilter.property) return false;
    if(financeFilter.status && r.status!==financeFilter.status) return false;
    if(financeFilter.period && r.period!==financeFilter.period) return false;
    return true;
  }).sort((a,b)=> b.period.localeCompare(a.period));

  const previsto = filtered.reduce((s,r)=>s+Number(r.expectedAmount||0),0);
  const cobrado = filtered.reduce((s,r)=> s+(r.status==='Cobrado'?Number(r.paidAmount||0):0),0);
  const impagado = filtered.reduce((s,r)=> s+(r.status==='Impago'?Number(r.expectedAmount||0):0),0);

  const periods = Array.from(new Set(rows.map(r=>r.period))).sort();
  const last6 = periods.slice(-6);
  const chartData = last6.map(period=>({label:period.slice(5), value: rows.filter(r=>r.period===period && r.status==='Cobrado').reduce((s,r)=>s+Number(r.paidAmount||0),0)}));

  return `
  <div class="card p-3 mb-4 flex flex-wrap gap-2 items-end">
    <div class="min-w-[160px]"><label class="field-label">Cliente</label><select id="finFClient"><option value="">Todos</option>${state.clients.map(c=>`<option value="${c.id}" ${financeFilter.client===c.id?'selected':''}>${esc(c.name)}</option>`).join('')}</select></div>
    <div class="min-w-[180px]"><label class="field-label">Inmueble</label><select id="finFProperty"><option value="">Todos</option>${state.properties.map(p=>`<option value="${p.id}" ${financeFilter.property===p.id?'selected':''}>${esc(p.address)}</option>`).join('')}</select></div>
    <div class="min-w-[140px]"><label class="field-label">Estado de pago</label><select id="finFStatus"><option value="">Todos</option>${['Pendiente','Cobrado','Impago'].map(s=>`<option ${financeFilter.status===s?'selected':''}>${s}</option>`).join('')}</select></div>
    <div class="min-w-[140px]"><label class="field-label">Periodo</label><select id="finFPeriod"><option value="">Todos</option>${periods.slice().reverse().map(p=>`<option ${financeFilter.period===p?'selected':''}>${p}</option>`).join('')}</select></div>
    <button data-action="finance-filter-clear" class="btn btn-outline btn-sm">Limpiar</button>
  </div>

  <div class="grid grid-cols-2 md:grid-cols-3 gap-3 mb-4">
    <div class="stat-tile"><div class="text-xs text-slate-500">Previsto</div><div class="text-lg font-bold">${fmtMoney(previsto)}</div></div>
    <div class="stat-tile"><div class="text-xs text-slate-500">Cobrado</div><div class="text-lg font-bold text-green-700">${fmtMoney(cobrado)}</div></div>
    <div class="stat-tile"><div class="text-xs text-slate-500">Impagado</div><div class="text-lg font-bold text-red-600">${fmtMoney(impagado)}</div></div>
  </div>

  <div class="card p-4 mb-4">
    <h2 class="font-bold text-sm mb-2">Ingresos cobrados por mes (todos los inmuebles)</h2>
    ${chartData.length===0?'<p class="text-sm text-slate-400">Sin histórico.</p>':svgBarChart(chartData)}
  </div>

  <div class="card overflow-x-auto">
    <table class="tbl">
      <thead><tr><th>Periodo</th><th>Inmueble</th><th>Cliente</th><th>Arrendatario</th><th>Previsto</th><th>Cobrado</th><th>Estado</th><th></th></tr></thead>
      <tbody>
        ${filtered.length===0?`<tr><td colspan="8" class="text-center text-slate-400 py-6">Sin resultados</td></tr>`:filtered.map(r=>`
        <tr>
          <td class="font-medium">${esc(r.period)}</td>
          <td><a href="#/inmuebles/${r.prop.id}" class="text-[#b8860b] hover:underline">${esc(r.prop.address)}</a></td>
          <td>${esc(clientName(r.clientId))}</td>
          <td>${esc(r.ct.tenant)}</td>
          <td>${fmtMoney(r.expectedAmount)}</td>
          <td>${r.status==='Cobrado'?fmtMoney(r.paidAmount):'—'}</td>
          <td><span class="badge ${r.status==='Cobrado'?'badge-green':r.status==='Impago'?'badge-red':'badge-yellow'}">${esc(r.status)}</span></td>
          <td class="text-right"><a href="#/contratos/${r.ct.id}" class="btn btn-outline btn-sm">Ver contrato</a></td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}

let paymentFilter = {status:''};
function computeRentability(contractId){
  const pays = state.payments.filter(p=>p.contractId===contractId);
  const previsto = pays.reduce((s,p)=>s+Number(p.expectedAmount||0),0);
  const cobrado = pays.reduce((s,p)=>s+(p.status==='Cobrado'?Number(p.paidAmount||0):0),0);
  const impagado = pays.reduce((s,p)=> s + (p.status==='Impago'? Number(p.expectedAmount||0):0), 0);
  const rate = previsto>0 ? (cobrado/previsto*100) : 0;
  return {previsto, cobrado, impagado, rate, count: pays.length};
}

function svgBarChart(data, opts){
  opts = opts || {};
  const w = opts.width||560, h = opts.height||180, pad = 30;
  const max = Math.max(1, ...data.map(d=>d.value));
  const bw = (w-pad*2)/data.length;
  const bars = data.map((d,i)=>{
    const bh = Math.max(2,(d.value/max)*(h-pad*2));
    const x = pad + i*bw + bw*0.15;
    const y = h-pad-bh;
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${(bw*0.7).toFixed(1)}" height="${bh.toFixed(1)}" fill="${d.color||'#1e293b'}" rx="2"><title>${esc(d.label)}: ${fmtMoney(d.value)}</title></rect>
      <text x="${(x+bw*0.35).toFixed(1)}" y="${h-pad+14}" font-size="9" fill="#64748b" text-anchor="middle">${esc(d.label)}</text>`;
  }).join('');
  return `<svg viewBox="0 0 ${w} ${h}" class="w-full h-auto">
    <line x1="${pad}" y1="${h-pad}" x2="${w-pad}" y2="${h-pad}" stroke="#e2e8f0"/>
    ${bars}
  </svg>`;
}

let calMonth = todayISO().slice(0,7);
function viewCalendar(){
  const [y,m] = calMonth.split('-').map(Number);
  const first = new Date(y, m-1, 1);
  const startOffset = (first.getDay()+6)%7; // lunes=0
  const daysInMonth = new Date(y, m, 0).getDate();
  const monthNames = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

  const dayItems = {};
  function push(dateStr, item){ if(!dateStr) return; (dayItems[dateStr] = dayItems[dateStr]||[]).push(item); }
  state.cases.forEach(c=>(c.milestones||[]).forEach(ms=>{ if(!ms.done) push(ms.dueDate, {label:`${c.ref}: ${ms.title}`, type:'exp', link:`#/expedientes/${c.id}`}); }));
  state.contracts.forEach(ct=>{ if(ct.status==='Activo') push(ct.renewalDate||ct.endDate, {label:`Vence: ${ct.tenant}`, type:'alq', link:`#/contratos/${ct.id}`}); });
  state.events.forEach(ev=> push(ev.date, {label:ev.title, type:'manual', id: ev.id}));

  let cells = '';
  for(let i=0;i<startOffset;i++) cells += `<div class="border border-slate-100 bg-slate-50 min-h-[90px]"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const dateStr = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const items = dayItems[dateStr]||[];
    const isToday = dateStr===todayISO();
    cells += `<div class="border border-slate-100 min-h-[90px] p-1 align-top ${isToday?'bg-yellow-50':'bg-white'}">
      <div class="text-xs font-semibold ${isToday?'text-[#b8860b]':'text-slate-500'} mb-1">${d}</div>
      <div class="space-y-0.5">
        ${items.slice(0,3).map(it=>{
          const color = it.type==='exp'?'badge-blue':it.type==='alq'?'badge-yellow':'badge-gray';
          const inner = `<span class="badge ${color} !block truncate text-left">${esc(it.label)}</span>`;
          return it.link? `<a href="${it.link}">${inner}</a>` : `<div class="group relative">${inner}${it.id?`<button data-action="event-delete" data-id="${it.id}" class="hidden group-hover:inline text-red-400 text-xs ml-1">✕</button>`:''}</div>`;
        }).join('')}
        ${items.length>3?`<div class="text-[10px] text-slate-400">+${items.length-3} más</div>`:''}
      </div>
    </div>`;
  }

  return `
  <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
    <h1 class="text-xl font-bold text-slate-800">Calendario</h1>
    <div class="flex items-center gap-2">
      <button data-action="cal-prev" class="btn btn-outline btn-sm">&larr;</button>
      <span class="font-semibold text-sm w-32 text-center">${monthNames[m-1]} ${y}</span>
      <button data-action="cal-next" class="btn btn-outline btn-sm">&rarr;</button>
      <button data-action="cal-today" class="btn btn-outline btn-sm">Hoy</button>
      <button data-action="event-new" class="btn btn-primary btn-sm">+ Evento</button>
    </div>
  </div>
  <div class="flex gap-3 mb-3 text-xs">
    <span class="badge badge-blue">Expediente</span><span class="badge badge-yellow">Alquiler</span><span class="badge badge-gray">Evento manual</span>
  </div>
  <div class="grid grid-cols-7 text-center text-xs font-semibold text-slate-500 mb-1">
    ${['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'].map(d=>`<div>${d}</div>`).join('')}
  </div>
  <div class="grid grid-cols-7 gap-px bg-slate-100 border border-slate-100 rounded-lg overflow-hidden">${cells}</div>
  `;
}

      <tbody>
        ${unpaid.length===0?`<tr><td colspan="5" class="text-center text-slate-400 py-4">Sin impagos registrados</td></tr>`:unpaid.map(p=>`
          <tr><td>${esc(p.period)}</td><td>${esc(p.property)}</td><td>${esc(p.tenant)}</td><td class="text-red-600 font-semibold">${fmtMoney(p.expectedAmount)}</td><td class="text-slate-500">${esc(p.notes)}</td></tr>`).join('')}
      </tbody>
    </table>
  </div>
  `;
}

/* =========================================================
   VISTA: AJUSTES
========================================================= */
function viewSettings(){
  return `
  <h1 class="text-xl font-bold text-slate-800 mb-4">Ajustes</h1>
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
    ${configListCard('Tipos de asunto', 'matterTypes')}
    ${configListCard('Etapas del pipeline', 'pipelineStages')}
    ${configListCard('Abogados', 'lawyers')}
  </div>
  <div class="card p-4">
    <h2 class="font-bold text-sm mb-2">Copia de seguridad</h2>
    <p class="text-sm text-slate-500 mb-3">Exporta todos los datos a un archivo JSON, o importa un backup previo para restaurarlos (sustituye los datos actuales).</p>
    <div class="flex gap-2">
      <button data-action="backup-export" class="btn btn-primary">Exportar backup (JSON)</button>
      <button data-action="backup-import" class="btn btn-outline">Importar backup (JSON)</button>
      <button data-action="seed-reset" class="btn btn-danger">Vaciar datos de ejemplo</button>
    </div>
  </div>
  `;
}
function configListCard(title, key){
  return `<div class="card p-4">
    <h2 class="font-bold text-sm mb-2">${esc(title)}</h2>
    <div class="space-y-1 mb-2">
      ${state[key].map((v,i)=>`<div class="flex items-center justify-between text-sm border-b border-slate-50 py-1">
        <span>${esc(v)}</span><button data-action="config-remove" data-key="${key}" data-idx="${i}" class="text-slate-300 hover:text-red-500 text-lg leading-none">&times;</button>
      </div>`).join('')}
    </div>
    <form data-form="config-add" data-key="${key}" class="flex gap-1">
      <input type="text" name="value" placeholder="Añadir..." class="text-xs">
      <button type="submit" class="btn btn-outline btn-sm">+</button>
    </form>
  </div>`;
}

/* =========================================================
   ACCIONES (delegación de eventos)
========================================================= */
const Actions = {
  'modal-close': ()=>closeModal(),

  'client-new': ()=> openModal('Nuevo cliente', clientForm()),
  'client-edit': (id)=> openModal('Editar cliente', clientForm(clientById(id))),
  'client-delete': (id)=>{
    if(!confirmAction('¿Eliminar este cliente? También se perderá su vínculo con expedientes e inmuebles asociados.')) return;
    mutate(s=>{ s.clients = s.clients.filter(c=>c.id!==id); });
    closeModal(); toast('Cliente eliminado'); location.hash = '#/clientes';
  },

  'case-new': (_, target)=> openModal('Nuevo expediente', caseForm(null, target && target.dataset.client)),
  'case-edit': (id)=> openModal('Editar expediente', caseForm(caseById(id))),
  'case-delete': (id)=>{
    if(!confirmAction('¿Eliminar este expediente?')) return;
    mutate(s=>{ s.cases = s.cases.filter(c=>c.id!==id); });
    closeModal(); toast('Expediente eliminado'); location.hash = '#/expedientes';
  },
  'case-view-kanban': ()=>{ caseViewMode='kanban'; render(); },
  'case-view-list': ()=>{ caseViewMode='list'; render(); },
  'case-filter-clear': ()=>{ caseFilter = {q:'', client:'', status:'', lawyer:'', matter:''}; render(); },

  'milestone-new': (_, target)=>{
    const caseId = target.dataset.case;
    openModal('Nuevo hito', `
      <form data-form="milestone" data-case="${caseId}" class="space-y-3">
        <div><label class="field-label">Título *</label><input type="text" name="title" required></div>
        <div><label class="field-label">Fecha límite *</label><input type="date" name="dueDate" required value="${todayISO()}"></div>
        <div class="flex justify-end gap-2 pt-2"><button type="button" data-action="modal-close" class="btn btn-outline">Cancelar</button><button type="submit" class="btn btn-primary">Guardar</button></div>
      </form>`);
  },
  'milestone-toggle': (_, target)=>{
    const caseId = target.dataset.case, msId = target.dataset.id;
    mutate(s=>{ const cs = s.cases.find(x=>x.id===caseId); const m = cs.milestones.find(x=>x.id===msId); m.done = target.checked; });
  },
  'milestone-delete': (_, target)=>{
    const caseId = target.dataset.case, msId = target.dataset.id;
    if(!confirmAction('¿Eliminar este hito?')) return;
    mutate(s=>{ const cs = s.cases.find(x=>x.id===caseId); cs.milestones = cs.milestones.filter(m=>m.id!==msId); });
  },
  'log-new': (_, target)=>{
    const caseId = target.dataset.case;
    openModal('Nueva actuación', `
      <form data-form="log" data-case="${caseId}" class="space-y-3">
        <div><label class="field-label">Fecha *</label><input type="date" name="date" required value="${todayISO()}"></div>
        <div><label class="field-label">Descripción *</label><textarea name="text" rows="3" required></textarea></div>
        <div class="flex justify-end gap-2 pt-2"><button type="button" data-action="modal-close" class="btn btn-outline">Cancelar</button><button type="submit" class="btn btn-primary">Guardar</button></div>
      </form>`);
  },
  'log-delete': (_, target)=>{
    const caseId = target.dataset.case, logId = target.dataset.id;
    if(!confirmAction('¿Eliminar esta actuación?')) return;
    mutate(s=>{ const cs = s.cases.find(x=>x.id===caseId); cs.log = cs.log.filter(l=>l.id!==logId); });
  },

  'property-view-list': ()=>{ propertyViewMode='list'; render(); },
  'property-view-finance': ()=>{ propertyViewMode='finance'; render(); },
  'finance-filter-clear': ()=>{ financeFilter = {client:'', property:'', status:'', period:''}; render(); },
  'property-filter-clear': ()=>{ propertyFilter = {q:'', client:''}; render(); },

  'property-new': (_, target)=> openModal('Nuevo inmueble', propertyForm(null, target && target.dataset.client)),
  'property-edit': (id)=> openModal('Editar inmueble', propertyForm(propertyById(id))),
  'property-delete': (id)=>{
    if(!confirmAction('¿Eliminar este inmueble? Se eliminarán también sus contratos y pagos asociados.')) return;
    mutate(s=>{
      const contractIds = s.contracts.filter(c=>c.propertyId===id).map(c=>c.id);
      s.payments = s.payments.filter(p=>!contractIds.includes(p.contractId));
      s.contracts = s.contracts.filter(c=>c.propertyId!==id);
      s.properties = s.properties.filter(p=>p.id!==id);
    });
    closeModal(); toast('Inmueble eliminado'); location.hash = '#/inmuebles';
  },

  'contract-new': (_, target)=> openModal('Nuevo contrato', contractForm(null, target.dataset.property)),
  'contract-edit': (id)=> openModal('Editar contrato', contractForm(contractById(id))),
  'contract-delete': (id)=>{
    if(!confirmAction('¿Eliminar este contrato y su histórico de pagos?')) return;
    const ct = contractById(id); const propId = ct ? ct.propertyId : null;
    mutate(s=>{ s.payments = s.payments.filter(p=>p.contractId!==id); s.contracts = s.contracts.filter(c=>c.id!==id); });
    closeModal(); toast('Contrato eliminado'); location.hash = propId? `#/inmuebles/${propId}` : '#/inmuebles';
  },

  'payment-new': (_, target)=> openModal('Registrar pago', paymentForm(null, target.dataset.contract)),
  'payment-edit': (id, target)=> openModal('Editar pago', paymentForm(state.payments.find(p=>p.id===id), target.dataset.contract)),
  'payment-delete': (id, target)=>{
    if(!confirmAction('¿Eliminar este registro de pago?')) return;
    mutate(s=>{ s.payments = s.payments.filter(p=>p.id!==id); });
    closeModal(); toast('Pago eliminado');
  },

  'event-new': ()=> openModal('Nuevo evento', eventForm()),
  'event-delete': (id)=>{
    if(!confirmAction('¿Eliminar este evento?')) return;
    mutate(s=>{ s.events = s.events.filter(e=>e.id!==id); });
  },
  'cal-prev': ()=>{ const [y,m]=calMonth.split('-').map(Number); const d=new Date(y,m-2,1); calMonth = d.toISOString().slice(0,7); render(); },
  'cal-next': ()=>{ const [y,m]=calMonth.split('-').map(Number); const d=new Date(y,m,1); calMonth = d.toISOString().slice(0,7); render(); },
  'cal-today': ()=>{ calMonth = todayISO().slice(0,7); render(); },

  'document-new': (_, target)=>{
    const type = (target.dataset.type)||'client';
    const related = target.dataset.related || '';
    openModal('Nuevo documento', documentForm(type, related), { onMount: (box)=> wireDocumentForm(box, type, related) });
  },
  'document-delete': (id)=>{
    if(!confirmAction('¿Eliminar este documento?')) return;
    mutate(s=>{ s.documents = s.documents.filter(d=>d.id!==id); });
  },

  'config-remove': (_, target)=>{
    const key = target.dataset.key, idx = Number(target.dataset.idx);
    mutate(s=>{ s[key].splice(idx,1); });
  },

  'backup-export': ()=>{ DB.exportJSON(state); toast('Backup descargado'); },
  'backup-import': ()=> $('#importFile').click(),

  'seed-reset': ()=>{
    if(!confirmAction('Esto sustituirá TODOS los datos actuales por los datos de ejemplo. ¿Continuar?')) return;
    state = DB.seed(); persist(); location.hash = '#/dashboard'; render(); toast('Datos de ejemplo restaurados');
  },
};

document.addEventListener('click', (e)=>{
  const target = e.target.closest('[data-action]');
  if(!target) return;
  const action = target.dataset.action;
  if(Actions[action]){ e.preventDefault(); Actions[action](target.dataset.id, target); }
});

/* Kanban drag & drop (delegated) */
let draggedCaseId = null;
document.addEventListener('dragstart', (e)=>{
  const card = e.target.closest('.kanban-card');
  if(!card) return;
  draggedCaseId = card.dataset.caseid;
  card.classList.add('dragging');
});
document.addEventListener('dragend', (e)=>{
  const card = e.target.closest('.kanban-card');
  if(card) card.classList.remove('dragging');
  $$('.kanban-col').forEach(c=>c.classList.remove('drag-over'));
});
document.addEventListener('dragover', (e)=>{
  const zone = e.target.closest('.kanban-dropzone');
  if(!zone) return;
  e.preventDefault();
  zone.closest('.kanban-col').classList.add('drag-over');
});
document.addEventListener('dragleave', (e)=>{
  const zone = e.target.closest('.kanban-dropzone');
  if(zone) zone.closest('.kanban-col').classList.remove('drag-over');
});
document.addEventListener('drop', (e)=>{
  const zone = e.target.closest('.kanban-dropzone');
  if(!zone || !draggedCaseId) return;
  e.preventDefault();
  const newStatus = zone.dataset.status;
  mutate(s=>{ const c = s.cases.find(x=>x.id===draggedCaseId); if(c) c.status = newStatus; });
  draggedCaseId = null;
});

/* Formularios (delegación submit) */
document.addEventListener('submit', (e)=>{
  const form = e.target.closest('form[data-form]');
  if(!form) return;
  e.preventDefault();
  const type = form.dataset.form;
  const fd = new FormData(form);
  const data = Object.fromEntries(fd.entries());

  if(type==='client'){
    const id = form.dataset.id;
    mutate(s=>{
      if(id){ Object.assign(s.clients.find(c=>c.id===id), data); }
      else { s.clients.push({id: uid(), ...data}); }
    });
    closeModal(); toast('Cliente guardado');
  }
  else if(type==='case'){
    const id = form.dataset.id;
    data.fees = Number(data.fees)||0;
    mutate(s=>{
      if(id){ Object.assign(s.cases.find(c=>c.id===id), data); }
      else { s.cases.push({id: uid(), milestones:[], log:[], ...data}); }
    });
    closeModal(); toast('Expediente guardado');
  }
  else if(type==='milestone'){
    const caseId = form.dataset.case;
    mutate(s=>{ s.cases.find(c=>c.id===caseId).milestones.push({id: uid(), title:data.title, dueDate:data.dueDate, done:false}); });
    closeModal();
  }
  else if(type==='log'){
    const caseId = form.dataset.case;
    mutate(s=>{ s.cases.find(c=>c.id===caseId).log.push({id: uid(), date:data.date, text:data.text}); });
    closeModal();
  }
  else if(type==='property'){
    const id = form.dataset.id;
    data.area = data.area? Number(data.area): '';
    mutate(s=>{
      if(id){ Object.assign(s.properties.find(p=>p.id===id), data); }
      else { s.properties.push({id: uid(), ...data}); }
    });
    closeModal(); toast('Inmueble guardado');
  }
  else if(type==='contract'){
    const id = form.dataset.id;
    data.rentAmount = Number(data.rentAmount)||0;
    data.deposit = Number(data.deposit)||0;
    mutate(s=>{
      if(id){ Object.assign(s.contracts.find(c=>c.id===id), data); }
      else { s.contracts.push({id: uid(), ...data}); }
    });
    closeModal(); toast('Contrato guardado');
  }
  else if(type==='payment'){
    const id = form.dataset.id;
    const contractId = form.dataset.contract;
    data.expectedAmount = Number(data.expectedAmount)||0;
    data.paidAmount = Number(data.paidAmount)||0;
    mutate(s=>{
      if(id){ Object.assign(s.payments.find(p=>p.id===id), data); }
      else { s.payments.push({id: uid(), contractId, ...data}); }
    });
    closeModal(); toast('Pago guardado');
  }
  else if(type==='event'){
    const id = form.dataset.id;
    mutate(s=>{
      if(id){ Object.assign(s.events.find(ev=>ev.id===id), data); }
      else { s.events.push({id: uid(), ...data}); }
    });
    closeModal(); toast('Evento guardado');
  }
  else if(type==='document'){
    mutate(s=>{ s.documents.push({id: uid(), name:data.name, relatedType:data.relatedType, relatedId:data.relatedId, url:data.url, notes:data.notes||'', createdAt: todayISO()}); });
    closeModal(); toast('Documento guardado');
  }
  else if(type==='config-add'){
    const key = form.dataset.key;
    const val = (data.value||'').trim();
    if(val){ mutate(s=>{ if(!s[key].includes(val)) s[key].push(val); }); }
    form.reset();
  }
});

/* Inputs con debounce (búsquedas y filtros) — delegado por 'input'/'change' */
document.addEventListener('input', (e)=>{
  if(e.target.id==='clientSearch'){ clientFilter.q = e.target.value; renderPreserveFocus('clientSearch', viewClientsList); }
  if(e.target.id==='propertySearch'){ propertyFilter.q = e.target.value; renderPreserveFocus('propertySearch', viewPropertiesList); }
  if(e.target.id==='propertyFClient'){ propertyFilter.client = e.target.value; render(); }
  if(e.target.id==='caseSearch'){ caseFilter.q = e.target.value; renderPreserveFocus('caseSearch', ()=>render()); }
});
document.addEventListener('change', (e)=>{
  if(e.target.id==='caseFClient'){ caseFilter.client = e.target.value; render(); }
  if(e.target.id==='caseFStatus'){ caseFilter.status = e.target.value; render(); }
  if(e.target.id==='caseFLawyer'){ caseFilter.lawyer = e.target.value; render(); }
  if(e.target.id==='caseFMatter'){ caseFilter.matter = e.target.value; render(); }
  if(e.target.id==='paymentFStatus'){ paymentFilter.status = e.target.value; render(); }
  if(e.target.id==='finFClient'){ financeFilter.client = e.target.value; render(); }
  if(e.target.id==='finFProperty'){ financeFilter.property = e.target.value; render(); }
  if(e.target.id==='finFStatus'){ financeFilter.status = e.target.value; render(); }
  if(e.target.id==='finFPeriod'){ financeFilter.period = e.target.value; render(); }
  if(e.target.id==='importFile'){ handleImportFile(e.target.files[0]); }
});
function renderPreserveFocus(inputId, renderFn){
  const app = $('#app');
  app.innerHTML = renderFn();
  afterRenderHooks();
  const input = document.getElementById(inputId);
  if(input){ input.focus(); const v=input.value; input.value=''; input.value=v; }
}

function handleImportFile(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const parsed = JSON.parse(reader.result);
      if(!parsed || typeof parsed !== 'object' || !Array.isArray(parsed.clients)){
        throw new Error('El archivo no tiene el formato esperado.');
      }
      if(!confirmAction('Esto sustituirá todos los datos actuales por los del archivo importado. ¿Continuar?')) return;
      state = Object.assign(DB.empty(), parsed);
      persist();
      location.hash = '#/dashboard';
      render();
      toast('Backup importado correctamente');
    }catch(err){
      alert('No se pudo importar el archivo: '+err.message);
    }finally{
      $('#importFile').value = '';
    }
  };
  reader.readAsText(file);
}

/* Sidebar móvil */
$('#btnBurger').addEventListener('click', ()=> $('#sidebar').classList.toggle('-translate-x-full'));

/* Init */
window.addEventListener('hashchange', route);
if(!location.hash) location.hash = '#/dashboard';
route();
if(freshInstall) toast('Datos de ejemplo cargados. Puedes vaciarlos desde el menú lateral.');

})();
</script>
